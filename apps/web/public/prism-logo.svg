<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 175" fill="none">
  <defs>
    <linearGradient id="pg" x1="5" y1="170" x2="170" y2="5" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B0764"/>
      <stop offset="45%"  stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Purple outer triangle with rounded corners -->
  <!-- Outer vertices: T(100,5) BL(5,170) BR(195,170), corner-radius ≈ 11 -->
  <path d="M95,15 L11,161 Q5,170 17,170 L183,170 Q195,170 189,161 L105,15 Q100,5 95,15Z"
        fill="url(#pg)"/>

  <!--
    Inner triangle: T'(100,23) BL'(28,162) BR'(172,162)
    Focal point = BL'(28,162)
    Dividing lines from focal point hit the right edge T'→BR':
      P(t) = (100+72t, 23+139t)
      P1 = t=0.20 → (114, 51)   magenta | red
      P2 = t=0.32 → (123, 67)   red     | white
      P3 = t=0.36 → (126, 73)   white   | orange
      P4 = t=0.61 → (144, 108)  orange  | yellow
      P5 = t=0.71 → (151, 122)  yellow  | cyan
  -->

  <!-- 1. Hot pink / Magenta -->
  <polygon points="28,162 100,23 114,51" fill="#E91E63"/>
  <!-- 2. Coral red -->
  <polygon points="28,162 114,51 123,67" fill="#F44336"/>
  <!-- 3. White sliver (light entering the prism) -->
  <polygon points="28,162 123,67 126,73" fill="#FFFFFF"/>
  <!-- 4. Deep orange -->
  <polygon points="28,162 126,73 144,108" fill="#FF5722"/>
  <!-- 5. Amber / warm yellow -->
  <polygon points="28,162 144,108 151,122" fill="#FFC107"/>
  <!-- 6. Sky cyan / light blue -->
  <polygon points="28,162 151,122 172,162" fill="#29B6F6"/>
</svg>
